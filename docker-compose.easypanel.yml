# MetaboAnalytics — EasyPanel deployment
#
# Setup in EasyPanel:
#   1. Create a project → Services → Compose (Beta)
#   2. Connect this GitHub repository (or paste this file into the editor)
#   3. Set "Compose file" to: docker-compose.easypanel.yml
#   4. Replace CHANGE_ME_* secrets below before deploying
#   5. Deploy, then open the "web" service → Domains → add your domain
#      Proxy port: 80 (container internal port — NOT a host port)
#
# IMPORTANT — do NOT use host "ports" mappings in this file.
# EasyPanel injects docker-compose.override.yml and merges port lists;
# binding 80 or 47821 on the host conflicts with Traefik (port already allocated).
# Use "expose" only; EasyPanel routes your domain to the container via its proxy.
#
# Internal port map (Docker network only):
#   web    80    (nginx — point EasyPanel domain proxy here)
#   api    47822
#   python 47824
#   db     5432
#   - EasyPanel does not load .env files — all variables are defined here.
#   - After first deploy, sign in at your domain with:
#       Email: sarah.chen@university.edu
#       Password: password123

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabo
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
      POSTGRES_DB: metaboanalytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabo -d metaboanalytics"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "47824"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:47824/health')\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://metabo:CHANGE_ME_DB_PASSWORD@db:5432/metaboanalytics
      JWT_SECRET: CHANGE_ME_JWT_SECRET
      PORT: "47822"
      NODE_ENV: production
      PYTHON_SERVICE_URL: http://python:47824
      USE_PYTHON_ANALYSIS: "true"
      RAW_DATA_DIR: /data/raw
      APP_URL: https://CHANGE_ME_YOUR_DOMAIN
      SEED_DEMO_DATA: "false"
    expose:
      - "47822"
    volumes:
      - raw_data:/data/raw
    depends_on:
      db:
        condition: service_healthy
      python:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:47822/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        METABO_API_PORT: "47822"
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  raw_data:
