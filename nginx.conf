server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # mzXML uploads can be hundreds of MB — default 1m rejects most raw MS files.
    client_max_body_size 500m;
    client_body_timeout 600s;
    client_body_buffer_size 256k;

    # Docker embedded DNS — resolves api/python service names reliably.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        # Variable upstream + resolver avoids stale Docker DNS; omit URI suffix so
        # the full request path (e.g. /api/auth/login) is forwarded correctly.
        set $api_upstream api;
        proxy_pass http://$api_upstream:API_PORT_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
