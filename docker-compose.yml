services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabo
      POSTGRES_PASSWORD: metabo_secret
      POSTGRES_DB: metaboanalytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${METABO_DB_PORT:-47823}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabo -d metaboanalytics"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://metabo:metabo_secret@db:5432/metaboanalytics
      JWT_SECRET: ${JWT_SECRET:-metaboanalytics-production-secret-change-me}
      PORT: ${METABO_API_PORT:-47822}
    ports:
      - "${METABO_API_PORT:-47822}:${METABO_API_PORT:-47822}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.PORT||47822;require('http').get('http://127.0.0.1:'+p+'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        METABO_API_PORT: ${METABO_API_PORT:-47822}
    restart: unless-stopped
    ports:
      - "${METABO_WEB_PORT:-47821}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
